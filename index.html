<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>药盒子女管理端</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .input-item { margin-bottom: 15px; }
        label { display: block; font-size: 14px; color: #666; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-nfc { background: #34c759; color: white; }
        .btn-send { background: #007aff; color: white; }
        #status { margin-top: 20px; font-size: 14px; padding: 10px; border-radius: 8px; text-align: center; }
        .success { background: #e2f9e1; color: #28cd41; }
        .error { background: #ffe5e5; color: #ff3b30; }
    </style>
</head>
<body>

<div class="card">
    <h3>💊 药品绑定与设置</h3>
    
    <div class="input-item">
        <label>1. 感应NFC卡获取UID</label>
        <button class="btn-nfc" onclick="scanNFC()">手机贴近NFC卡读取</button>
        <input type="text" id="uidInput" placeholder="等待读取或手动输入UID">
    </div>

    <div class="input-item">
        <label>2. 输入药品信息</label>
        <input type="text" id="nameInput" placeholder="药品名称（如：感冒灵）">
        <input type="text" id="doseInput" placeholder="用药剂量（如：两粒）" style="margin-top:5px">
    </div>

    <div class="input-item">
        <label>3. 设置提醒时间</label>
        <input type="time" id="timeInput" value="08:30">
    </div>

    <button class="btn-send" onclick="sendToBox()">同步到药盒</button>

    <div id="status">等待操作...</div>
</div>

<script>
    const broker = 'wss://broker.emqx.io:8084/mqtt';
    const client = mqtt.connect(broker);
    
    client.on('connect', () => {
        client.subscribe('medbox/S3/status');
        showStatus("已连接云端服务器", "success");
    });

    client.on('message', (topic, msg) => {
        const text = msg.toString();
        if(text.includes("SUCCESS")) showStatus("✅ " + text, "success");
        else showStatus("⚠️ " + text, "error");
    });

    // 核心功能：使用手机自带NFC读取UID
    async function scanNFC() {
        if ('NDEFReader' in window) {
            try {
                const ndef = new NDEFReader();
                await ndef.scan();
                showStatus("请将NFC卡贴在手机背面...", "success");
                ndef.onreading = event => {
                    // 将UID转为HEX字符串
                    const serialNumber = event.serialNumber.replace(/:/g, "").toUpperCase();
                    document.getElementById('uidInput').value = serialNumber;
                    showStatus("卡片读取成功！", "success");
                };
            } catch (error) {
                showStatus("NFC开启失败: " + error, "error");
            }
        } else {
            alert("您的浏览器不支持Web NFC，请手动输入UID或使用安卓Chrome");
        }
    }

    function sendToBox() {
        const uid = document.getElementById('uidInput').value;
        const name = document.getElementById('nameInput').value;
        const dose = document.getElementById('doseInput').value;
        const time = document.getElementById('timeInput').value;

        if(!uid || !name || !dose) {
            alert("请完整填写信息！");
            return;
        }

        const [h, m] = time.split(':').map(Number);
        const payload = JSON.stringify({ uid, name, dose, h, m });

        client.publish('medbox/S3/config', payload, { qos: 1 });
        showStatus("正在发送绑定请求...", "success");
    }

    function showStatus(msg, type) {
        const div = document.getElementById('status');
        div.innerText = msg;
        div.className = type;
    }
</script>
</body>
</html>
