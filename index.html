<!-- index.html 完整覆盖 -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能药盒远程管家 V2.0</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        :root { --primary-color: #007AFF; --bg-color: #F2F2F7; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg-color); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-container { width: 92%; max-width: 400px; background: white; border-radius: 25px; padding: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .header { text-align: center; margin-bottom: 20px; }
        .status-tag { display: inline-block; padding: 4px 12px; border-radius: 50px; font-size: 12px; font-weight: 600; }
        .online { background: #E2F9E1; color: #28CD41; }
        .offline { background: #FFE5E5; color: #FF3B30; }
        .input-group { background: #F9F9F9; padding: 12px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #E5E5EA; }
        label { font-size: 12px; color: #8E8E93; display: block; margin-bottom: 5px; }
        input, select { width: 100%; border: none; background: transparent; font-size: 16px; outline: none; padding: 5px 0; }
        button { width: 100%; padding: 16px; background: var(--primary-color); color: white; border: none; border-radius: 14px; font-size: 17px; font-weight: 600; cursor: pointer; }
        .feedback-panel { margin-top: 20px; background: #F2F2F7; border-radius: 12px; padding: 12px; border: 1px solid #D1D1D6; font-size: 14px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1 style="font-size: 20px; margin: 0;">💊 孝心药盒远程端</h1>
        <div id="status" class="status-tag offline">云端连接中...</div>
    </div>

    <div class="input-group">
        <label>⏰ 提醒时间</label>
        <input type="time" id="timeInput" value="08:30">
    </div>

    <div class="input-group">
        <label>🔢 用药数量 (1-100)</label>
        <input type="number" id="numInput" min="1" max="100" value="2">
    </div>

    <div class="input-group">
        <label>📏 用药单位</label>
        <select id="unitInput">
            <option value="1">片 (Pian)</option>
            <option value="2">粒 (Li)</option>
            <option value="3">毫升 (ml)</option>
            <option value="4">包 (Bao)</option>
            <option value="5">支 (Zhi)</option>
        </select>
    </div>

    <button onclick="sendData()">同步设置到药盒</button>

    <div class="feedback-panel">
        <div id="logBox">等待药盒反馈...</div>
    </div>
</div>

<script>
    const broker = 'wss://broker.emqx.io:8084/mqtt';
    const client = mqtt.connect(broker, { clientId: 'Web_' + Math.random().toString(16).slice(2, 8) });

    client.on('connect', () => {
        document.getElementById('status').className = 'status-tag online';
        document.getElementById('status').innerText = '● 云端已连接';
        client.subscribe('medbox/S3/status');
    });

    client.on('message', (topic, message) => {
        if (topic === 'medbox/S3/status') {
            document.getElementById('logBox').innerText = "[" + new Date().toLocaleTimeString() + "] " + message.toString();
            document.getElementById('logBox').style.color = '#28CD41';
        }
    });

    function sendData() {
        const timeVal = document.getElementById('timeInput').value;
        const numVal = parseInt(document.getElementById('numInput').value);
        const unitVal = parseInt(document.getElementById('unitInput').value);

        if (numVal < 1 || numVal > 100) { alert("数量请输入 1-100"); return; }

        const [h, m] = timeVal.split(':').map(Number);
        const payload = JSON.stringify({ h: h, m: m, num: numVal, unit: unitVal });

        client.publish('medbox/S3/config', payload, { qos: 1 }, (err) => {
            if (!err) alert("指令已发送！");
        });
    }
</script>
</body>
</html>
