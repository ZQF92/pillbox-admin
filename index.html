<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>药盒管理端-手动配置版</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f2f2f7; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; border-radius: 20px; padding: 25px; width: 100%; max-width: 400px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .item { margin-bottom: 15px; }
        label { display: block; font-size: 13px; color: #888; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #007aff; color: white; border: none; border-radius: 12px; font-size: 17px; font-weight: bold; cursor: pointer; }
        #log { margin-top: 20px; padding: 12px; border-radius: 10px; font-size: 14px; text-align: center; }
        .success { background: #e2f9e1; color: #28cd41; }
        .info { background: #e1f5fe; color: #0288d1; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align:center">💊 远程药品配置</h2>
    
    <div class="item">
        <label>1. 卡片唯一 ID (UID)</label>
        <input type="text" id="uidInput" placeholder="请输入卡片UID(如:A1B2C3D4)">
    </div>

    <div class="item">
        <label>2. 药品名称</label>
        <input type="text" id="nameInput" placeholder="例如：感冒灵">
    </div>

    <div class="item">
        <label>3. 用药剂量</label>
        <input type="text" id="doseInput" placeholder="例如：两粒">
    </div>

    <div class="item">
        <label>4. 提醒时间</label>
        <input type="time" id="timeInput" value="08:30">
    </div>

    <button onclick="sendConfig()">同步到药盒</button>

    <div id="log" class="info">等待操作...</div>
</div>

<script>
    const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
    
    client.on('connect', () => {
        client.subscribe('medbox/S3/status');
        document.getElementById('log').innerText = "云端连接成功";
    });

    client.on('message', (topic, msg) => {
        document.getElementById('log').innerText = "药盒反馈: " + msg.toString();
        document.getElementById('log').className = "success";
    });

    function sendConfig() {
        const uid = document.getElementById('uidInput').value;
        const name = document.getElementById('nameInput').value;
        const dose = document.getElementById('doseInput').value;
        const time = document.getElementById('timeInput').value;

        if(!uid || !name || !dose) { alert("请完整填所有信息！"); return; }

        const [h, m] = time.split(':').map(Number);
        const payload = JSON.stringify({ uid, name, dose, h, m });

        client.publish('medbox/S3/config', payload, { qos: 1 });
        document.getElementById('log').innerText = "正在同步设置...";
    }
</script>
</body>
</html>
